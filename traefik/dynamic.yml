http:
  routers:
    # ── Chat  /chat/*  ────────────────────────────────────────────────────
    chat:
      rule: "Host(`openclaw-frostbite.duckdns.org`) && PathPrefix(`/chat`)"
      entryPoints:
        - websecure
      service: hub
      tls:
        certResolver: duckdns
      middlewares:
        - auth
        - security-headers
        - compress
        - rate-limit
      priority: 10

    # ── Monitor  /monitor/*  ─────────────────────────────────────────────
    monitor:
      rule: "Host(`openclaw-frostbite.duckdns.org`) && PathPrefix(`/monitor`)"
      entryPoints:
        - websecure
      service: hub
      tls:
        certResolver: duckdns
      middlewares:
        - auth
        - security-headers
        - compress
        - rate-limit
      priority: 10

    # ── Heartbeat  /heartbeat/*  ─────────────────────────────────────────
    heartbeat:
      rule: "Host(`openclaw-frostbite.duckdns.org`) && PathPrefix(`/heartbeat`)"
      entryPoints:
        - websecure
      service: hub
      tls:
        certResolver: duckdns
      middlewares:
        - auth
        - security-headers
        - compress
        - rate-limit
      priority: 10

    # ── Calendar  /calendar/*  ───────────────────────────────────────────
    calendar:
      rule: "Host(`openclaw-frostbite.duckdns.org`) && PathPrefix(`/calendar`)"
      entryPoints:
        - websecure
      service: hub
      tls:
        certResolver: duckdns
      middlewares:
        - auth
        - security-headers
        - compress
        - rate-limit
      priority: 10

    # ── Finance  /finance/*  ────────────────────────────────────────────────
    finance:
      rule: "Host(`openclaw-frostbite.duckdns.org`) && PathPrefix(`/finance`)"
      entryPoints:
        - websecure
      service: hub
      tls:
        certResolver: duckdns
      middlewares:
        - auth
        - security-headers
        - compress
        - rate-limit
      priority: 10

    # ── Nutrition  /nutrition/*  ──────────────────────────────────────────
    nutrition:
      rule: "Host(`openclaw-frostbite.duckdns.org`) && PathPrefix(`/nutrition`)"
      entryPoints:
        - websecure
      service: hub
      tls:
        certResolver: duckdns
      middlewares:
        - auth
        - security-headers
        - compress
        - rate-limit
      priority: 10

    # ── Datasette (Central DB)  /data/*  ─────────────────────────────────
    datasette:
      rule: "Host(`openclaw-frostbite.duckdns.org`) && PathPrefix(`/data`)"
      entryPoints:
        - websecure
      service: datasette
      tls:
        certResolver: duckdns
      middlewares:
        - auth
        - security-headers
        - compress
        - rate-limit
      priority: 10

    # ── Landing  /  (catch-all, lowest priority)  ────────────────────────
    landing:
      rule: "Host(`openclaw-frostbite.duckdns.org`)"
      entryPoints:
        - websecure
      service: hub
      tls:
        certResolver: duckdns
      middlewares:
        - auth
        - security-headers
        - compress
        - rate-limit
      priority: 1

  middlewares:
    auth:
      basicAuth:
        usersFile: /etc/traefik/.htpasswd
        removeHeader: true

    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"

    compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"

    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: "1m"

  services:
    hub:
      loadBalancer:
        servers:
          - url: "http://hub:8000"

    datasette:
      loadBalancer:
        servers:
          - url: "http://datasette:8001"
