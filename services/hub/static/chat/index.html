<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual-viewport">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Chat — Frostbite</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --kb-height: 0px;
    --bg:      #0d1117;
    --card:    #161b22;
    --border:  #30363d;
    --green:   #3fb950;
    --yellow:  #d29922;
    --red:     #f85149;
    --blue:    #58a6ff;
    --frost:   #a8d8ea;
    --muted:   #7d8590;
    --text:    #e6edf3;
    --text2:   #c9d1d9;
    --radius:  10px;
    --shadow:  0 2px 8px rgba(0,0,0,.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    font-size: 14px;
    height: 100dvh; overflow: hidden;
    display: flex; flex-direction: column;
    position: fixed; width: 100%; top: 0; left: 0;
  }

  /* ── Top nav ── */
  .topnav {
    background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 18px;
    padding: 0 20px; height: 48px; flex-shrink: 0; z-index: 100;
  }
  .topnav .brand { font-weight: 700; font-size: 15px; color: var(--frost); text-decoration: none; display: flex; align-items: center; gap: 6px; }
  .topnav a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; padding: 4px 0; transition: color .15s; }
  .topnav a:hover { color: var(--text); }
  .topnav a.active { color: var(--blue); border-bottom: 2px solid var(--blue); }

  /* ── Skill chips ── */

  /* ── Chat messages ── */
  #chat-messages { flex: 1; overflow-y: auto; padding: 12px 0; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
  .msg { display: flex; gap: 10px; align-items: flex-end; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; font-size: 14px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .msg-klaw .msg-avatar  { background: rgba(168,216,234,.15); order: 0; }
  .msg-body { max-width: 72%; min-width: 0; display: flex; flex-direction: column; }
  .msg-name {
    font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .msg-klaw .msg-name { color: var(--frost); }
  .msg-text {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px; padding: 10px 14px;
    font-size: 13px; line-height: 1.6; color: var(--text2); word-break: break-word;
  }
  /* User messages: bubble on right, no avatar/name */
  .msg-user { flex-direction: row-reverse; }
  .msg-user .msg-body { align-items: flex-end; }
  .msg-user .msg-name { display: none; }
  .msg-user .msg-text {
    border-radius: 14px 4px 14px 14px;
    background: rgba(88,166,255,.12); border-color: rgba(88,166,255,.25);
    color: var(--text);
  }
  .msg-text p { margin: 0 0 8px; } .msg-text p:last-child { margin-bottom: 0; }
  .msg-text ul, .msg-text ol { padding-left: 20px; margin: 6px 0; }
  .msg-text li { margin: 2px 0; }
  .msg-text code { background: rgba(255,255,255,.07); border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 12px; }
  .msg-text pre { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
  .msg-text pre code { background: none; padding: 0; }
  .msg-text h1, .msg-text h2, .msg-text h3 { font-size: 14px; margin: 10px 0 4px; color: var(--text); }
  .msg-text strong { color: var(--text); }
  .msg-text blockquote { border-left: 3px solid var(--blue); margin: 6px 0; padding: 4px 12px; color: var(--muted); }
  .msg-text a { color: var(--blue); }
  .msg-text table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .msg-text th, .msg-text td { border: 1px solid var(--border); padding: 5px 10px; font-size: 12px; }
  .msg-text th { background: rgba(255,255,255,.05); color: var(--text); }

  .msg-file-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.25);
    border-radius: 6px; padding: 3px 9px; font-size: 11px; color: var(--yellow); margin-top: 6px;
  }

  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
  .typing-dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce .8s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

  /* ── Input area ── */
  .chat-input-area {
    border-top: 1px solid var(--border); padding: 12px 0 env(safe-area-inset-bottom, 0px);
    display: flex; flex-direction: column; gap: 8px;
  }
  .chat-file-preview {
    display: none; background: rgba(210,153,34,.06); border: 1px solid rgba(210,153,34,.2);
    border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--yellow);
    align-items: center; justify-content: space-between; gap: 10px;
  }
  .chat-file-preview.active { display: flex; }
  .chat-file-remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; }
  .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
  #chat-input {
    flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: inherit; font-size: 13px; padding: 10px 14px;
    resize: none; min-height: 42px; max-height: 120px; line-height: 1.5; transition: border-color .15s;
  }
  #chat-input:focus { outline: none; border-color: var(--blue); }
  #chat-input::placeholder { color: var(--muted); }
  .chat-panel { padding-bottom: var(--kb-height); }
  .chat-action-btn {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); cursor: pointer; font-size: 16px; padding: 8px 10px;
    transition: background .15s, color .15s; flex-shrink: 0; height: 42px; display: flex; align-items: center;
  }
  .chat-action-btn:hover { background: rgba(255,255,255,.06); color: var(--text); }
  #chat-send-btn {
    background: var(--blue); border-color: var(--blue); color: #fff; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 16px; height: 42px;
    transition: opacity .15s; border: 1px solid var(--blue);
  }
  #chat-send-btn:hover { opacity: .85; }
  #chat-send-btn:disabled { opacity: .4; cursor: not-allowed; }
  .chat-hint { font-size: 11px; color: var(--muted); text-align: center; }

  /* ── Context bar ── */
  .ctx-bar-wrap { display: flex; align-items: center; gap: 10px; padding: 6px 0 2px; font-size: 11px; color: var(--muted); }
  .ctx-bar-track { flex: 1; background: #21262d; border-radius: 4px; height: 5px; overflow: hidden; }
  .ctx-bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease, background .3s; }
  .ctx-label { white-space: nowrap; min-width: 135px; text-align: right; }

  #chat-new-btn, #chat-sessions-btn {
    background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px;
    padding: 4px 10px; font-size: 11px; cursor: pointer; transition: color .15s, border-color .15s;
  }
  #chat-new-btn:hover, #chat-sessions-btn:hover { color: var(--text); border-color: var(--text); }

  /* ── Sessions drawer ── */
  #sessions-drawer {
    position: fixed; top: 0; right: -420px; width: 420px; max-width: 95vw;
    height: 100dvh; background: var(--card); border-left: 1px solid var(--border);
    box-shadow: -4px 0 24px rgba(0,0,0,.5); z-index: 400;
    display: flex; flex-direction: column; transition: right .25s ease;
  }
  #sessions-drawer.open { right: 0; }
  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(16px + env(safe-area-inset-top, 0px)) 18px 16px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .drawer-header h2 { font-size: 14px; font-weight: 600; color: var(--text); }
  .drawer-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 4px; border-radius: 4px; }
  .drawer-close:hover { color: var(--text); background: rgba(255,255,255,.06); }
  #sessions-list { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
  .sess-card { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .sess-card:hover { border-color: rgba(88,166,255,.35); }
  .sess-preview { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
  .sess-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .sess-actions { display: flex; gap: 6px; }
  .sess-continue-btn {
    background: rgba(88,166,255,.12); border: 1px solid rgba(88,166,255,.3); color: var(--blue);
    border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; transition: background .15s;
  }
  .sess-continue-btn:hover { background: rgba(88,166,255,.22); }
  .sess-delete-btn {
    background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.2); color: var(--red);
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; transition: background .15s;
  }
  .sess-delete-btn:hover { background: rgba(248,81,73,.18); }
  #sessions-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 399; }
  #sessions-overlay.open { display: block; }

  /* ── Drag-drop overlay ── */
  .drop-overlay {
    display: none; position: fixed; inset: 0; background: rgba(88,166,255,.12);
    border: 3px dashed var(--blue); z-index: 300; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: var(--blue); pointer-events: none;
  }
  .drop-overlay.active { display: flex; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    right: calc(20px + env(safe-area-inset-right, 0px));
    background: rgba(248,81,73,.9); color: white; padding: 10px 16px;
    border-radius: 8px; font-size: 12px; display: none; z-index: 200; max-width: 280px;
  }

  @media (max-width: 768px) {
    #sessions-drawer { width: 100vw; max-width: 100vw; right: -100vw; }
    #chat-input { font-size: 16px; }
  }
  @media (max-width: 520px) {
    .chat-hint { display: none; }
  }
</style>
</head>
<body>

<!-- ── Top Navigation ── -->
<nav class="topnav">
  <a class="brand" href="/" title="Back to Dashboard">← ❄️</a>
  <div style="margin-left:auto;display:flex;gap:6px">
    <button id="chat-sessions-btn" onclick="openSessionsDrawer()">📂 Sessions</button>
    <button id="chat-new-btn" onclick="newChatSession()">+ New Chat</button>
  </div>
</nav>

<div class="chat-panel" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;padding:12px 16px 0;">

  <!-- Context usage bar -->
  <div class="ctx-bar-wrap" id="ctx-bar-wrap" style="display:none">
    <div class="ctx-bar-track"><div class="ctx-bar-fill" id="ctx-bar-fill" style="width:0%"></div></div>
    <span class="ctx-label" id="ctx-label">— / — tokens</span>
  </div>

  <!-- Messages -->
  <div id="chat-messages" aria-live="polite" style="flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:16px;min-height:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:8px 0;">
    <div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0;">
      <div style="font-size:28px;margin-bottom:8px">❄️</div>
      <div style="font-weight:600;color:var(--text2);margin-bottom:4px">Frostbite is ready</div>
      <div>Ask anything, or pick a skill above to get started.</div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="chat-input-area">
    <div class="chat-file-preview" id="chat-file-preview">
      <div style="display:flex;align-items:center;gap:8px">
        <span>📎</span>
        <span id="chat-file-name">file.txt</span>
        <span id="chat-file-chars" style="color:var(--muted)"></span>
      </div>
      <button class="chat-file-remove" onclick="removeAttachment()" title="Remove">✕</button>
    </div>
    <div class="chat-input-row">
      <button class="chat-action-btn" onclick="document.getElementById('file-input').click()" title="Attach file">📎</button>
      <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(this)" accept=".txt,.md,.json,.yaml,.yml,.csv,.py,.js,.ts,.html,.css,.xml,.sh,.sql,.toml,.ini,.log,.env,.rs,.go,.java,.c,.cpp,.h,.rb,.php,.pdf,.docx">
      <textarea id="chat-input" placeholder="Message…" rows="1" onkeydown="handleChatKey(event)" oninput="autoGrowTextarea(this)" enterkeyhint="send" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="true"></textarea>
      <button id="chat-send-btn" onclick="sendChatMessage()">Send ↑</button>
    </div>
    <div class="chat-hint">Supported files: text/code files, .pdf, .docx — model: Qwen3.5-9B (text only, no images)</div>
  </div>

</div>

<!-- Sessions drawer -->
<div id="sessions-overlay" onclick="closeSessionsDrawer()"></div>
<div id="sessions-drawer">
  <div class="drawer-header">
    <h2>📂 Conversations</h2>
    <button class="drawer-close" onclick="closeSessionsDrawer()" title="Close">✕</button>
  </div>
  <div id="sessions-list">
    <div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">Loading…</div>
  </div>
</div>

<!-- Drag-and-drop overlay -->
<div class="drop-overlay" id="drop-overlay">📎 Drop file to attach</div>

<div id="toast"></div>

<script>
  const API = '/chat';

  // ── Mobile keyboard handling ──────────────────────────────────────────────
  (function() {
    if (window.visualViewport) {
      function onVPChange() {
        const active = document.activeElement;
        const inputFocused = active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT');
        if (!inputFocused) {
          document.documentElement.style.setProperty('--kb-height', '0px');
          return;
        }
        const kb = Math.max(0, window.innerHeight - window.visualViewport.offsetTop - window.visualViewport.height);
        document.documentElement.style.setProperty('--kb-height', kb + 'px');
        if (kb > 50) {
          const msgs = document.getElementById('chat-messages');
          if (msgs) setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 50);
        }
      }
      window.visualViewport.addEventListener('resize', onVPChange);
      window.visualViewport.addEventListener('scroll', onVPChange);
    }
  })();

  // ── Helpers ───────────────────────────────────────────────────────────────

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  const escHtml = escapeHtml;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    clearTimeout(t._tid);
    t._tid = setTimeout(() => { t.style.display = 'none'; }, 5000);
  }

  // ── Skills ────────────────────────────────────────────────────────────────

  let skillsLoaded = false;

  async function loadSkills() {
    if (skillsLoaded) return;
    try {
      const res = await fetch(`${API}/api/skills`);
      if (!res.ok) return;
      skillsLoaded = true;
    } catch (e) {}
  }

  // ── Chat ──────────────────────────────────────────────────────────────────

  let chatHistory = [];
  let attachedFile = null;
  let isStreaming  = false;
  let nCtx = 0;
  let lastTotalTokens = 0;
  let currentSessionId = null;

  const LS_KEY_HISTORY = 'frostbite_chat_history';
  const LS_KEY_SID     = 'frostbite_chat_session_id';

  function generateUUID() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
  }

  function saveToLocalStorage() {
    try {
      localStorage.setItem(LS_KEY_HISTORY, JSON.stringify(chatHistory));
      localStorage.setItem(LS_KEY_SID, currentSessionId || '');
    } catch(e) {}
  }

  function clearLocalStorage() {
    try {
      localStorage.removeItem(LS_KEY_HISTORY);
      localStorage.removeItem(LS_KEY_SID);
    } catch(e) {}
  }

  async function saveSessionToBackend() {
    if (!currentSessionId || chatHistory.length < 2) return;
    try {
      await fetch(`${API}/api/sessions/save`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: currentSessionId, messages: chatHistory }),
      });
    } catch(e) {}
  }

  function updateContextBar() {
    const wrap  = document.getElementById('ctx-bar-wrap');
    const fill  = document.getElementById('ctx-bar-fill');
    const label = document.getElementById('ctx-label');
    if (!lastTotalTokens) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'flex';
    const limit = nCtx || 0;
    const used  = lastTotalTokens;
    const pct   = limit ? Math.min(used / limit * 100, 100) : 0;
    const pctStr = limit ? pct.toFixed(1) + '%' : '';
    const color = pct >= 85 ? 'var(--red)' : pct >= 60 ? 'var(--yellow)' : 'var(--green)';
    fill.style.width      = pct + '%';
    fill.style.background = color;
    const usedFmt  = used.toLocaleString();
    const limitFmt = limit ? limit.toLocaleString() : '?';
    label.style.color  = color;
    label.textContent  = `${usedFmt} / ${limitFmt} ctx tokens${pctStr ? ' (' + pctStr + ')' : ''}`;
  }

  function newChatSession() {
    chatHistory = [];
    attachedFile = null;
    lastTotalTokens = 0;
    currentSessionId = generateUUID();
    clearLocalStorage();
    removeAttachment();
    document.getElementById('ctx-bar-wrap').style.display = 'none';
    document.getElementById('chat-messages').innerHTML = `
      <div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0;">
        <div style="font-size:28px;margin-bottom:8px">❄️</div>
        <div style="font-weight:600;color:var(--text2);margin-bottom:4px">New conversation started</div>
        <div>Ask anything, or pick a skill above to get started.</div>
      </div>`;
  }

  function handleChatKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
  }

  function autoGrowTextarea(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function appendMessage(role, content, isTyping = false) {
    const container = document.getElementById('chat-messages');
    const placeholder = container.querySelector('[style*="New conversation started"], [style*="Frostbite is ready"]');
    if (placeholder) placeholder.parentElement?.remove() || placeholder.remove();

    const div = document.createElement('div');
    const isUser = role === 'user';
    div.className = `msg msg-${isUser ? 'user' : 'klaw'}`;

    if (isTyping) {
      div.id = 'typing-msg';
      div.innerHTML = `
        <div class="msg-avatar">❄️</div>
        <div class="msg-body">
          <div class="msg-name">Frostbite</div>
          <div class="msg-text" id="streaming-text">
            <div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
          </div>
        </div>`;
    } else if (isUser) {
      const rendered = (typeof marked !== 'undefined') ? marked.parse(content) : content.replace(/\n/g, '<br>');
      div.innerHTML = `
        <div class="msg-body">
          <div class="msg-text">${rendered}</div>
        </div>`;
    } else {
      const rendered = (typeof marked !== 'undefined') ? marked.parse(content) : content.replace(/\n/g, '<br>');
      div.innerHTML = `
        <div class="msg-avatar">❄️</div>
        <div class="msg-body">
          <div class="msg-name">Frostbite</div>
          <div class="msg-text">${rendered}</div>
        </div>`;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  async function sendChatMessage() {
    if (isStreaming) return;
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text) return;

    const sendBtn = document.getElementById('chat-send-btn');
    isStreaming = true;
    sendBtn.disabled = true;
    sendBtn.textContent = '⏳';
    input.value = '';
    autoGrowTextarea(input);

    appendMessage('user', text);

    if (attachedFile) {
      const msgContainer = document.getElementById('chat-messages');
      const lastMsg = msgContainer.lastElementChild;
      if (lastMsg) {
        const badge = document.createElement('div');
        badge.className = 'msg-file-badge';
        badge.textContent = `📎 ${attachedFile.name} (${attachedFile.chars.toLocaleString()} chars)`;
        lastMsg.querySelector('.msg-body')?.appendChild(badge);
      }
    }

    chatHistory.push({ role: 'user', content: text });
    saveToLocalStorage();
    appendMessage('klaw', '', true);

    try {
      const payload = {
        messages:  chatHistory,
        file_text: attachedFile?.text  || null,
        file_name: attachedFile?.name  || null,
      };
      removeAttachment();

      const res = await fetch(`${API}/api/chat`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const reader   = res.body.getReader();
      const decoder  = new TextDecoder();
      const streamEl = document.getElementById('streaming-text');
      let fullText = '';
      let buffer   = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) throw new Error(parsed.error);
            if (parsed.usage && parsed.usage.total_tokens) {
              lastTotalTokens = parsed.usage.total_tokens;
            }
            const delta = parsed.choices?.[0]?.delta?.content || '';
            if (delta) {
              fullText += delta;
              if (streamEl) {
                streamEl.innerHTML = (typeof marked !== 'undefined') ? marked.parse(fullText) : fullText.replace(/\n/g, '<br>');
                document.getElementById('chat-messages').scrollTop = 99999;
              }
            }
          } catch (parseErr) {
            if (parseErr.message !== 'Unexpected end of JSON input') console.warn('SSE parse error:', parseErr);
          }
        }
      }

      document.getElementById('typing-msg')?.remove();
      if (fullText) {
        appendMessage('klaw', fullText);
        chatHistory.push({ role: 'assistant', content: fullText });
        updateContextBar();
        saveToLocalStorage();
        saveSessionToBackend();
      }

    } catch (err) {
      document.getElementById('typing-msg')?.remove();
      appendMessage('klaw', `⚠️ Error: ${err.message}`);
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send ↑';
    }
  }

  // ── Sessions drawer ─────────────────────────────────────────────────────

  function openSessionsDrawer() {
    document.getElementById('sessions-drawer').classList.add('open');
    document.getElementById('sessions-overlay').classList.add('open');
    loadSessionsList();
  }

  function closeSessionsDrawer() {
    document.getElementById('sessions-drawer').classList.remove('open');
    document.getElementById('sessions-overlay').classList.remove('open');
  }

  async function loadSessionsList() {
    const list = document.getElementById('sessions-list');
    list.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">Loading…</div>';
    try {
      const res = await fetch(`${API}/api/sessions/list`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderSessionsList(data.sessions || []);
    } catch (err) {
      list.innerHTML = `<div style="color:var(--red);font-size:12px;padding:12px">Error: ${err.message}</div>`;
    }
  }

  function renderSessionsList(sessions) {
    const list = document.getElementById('sessions-list');
    if (!sessions.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">No sessions found</div>';
      return;
    }
    list.innerHTML = sessions.map(s => `
      <div class="sess-card" id="sess-${s.id}">
        <div class="sess-preview">${escHtml(s.preview)}</div>
        <div class="sess-meta">${s.message_count} messages &nbsp;·&nbsp; ${s.modified}</div>
        <div class="sess-actions">
          <button class="sess-continue-btn" onclick="continueSession('${s.id}')">▶ Continue</button>
          <button class="sess-delete-btn" onclick="deleteSession('${s.id}', this)">🗑 Delete</button>
        </div>
      </div>`).join('');
  }

  async function continueSession(sessionId) {
    const btn = document.querySelector(`#sess-${sessionId} .sess-continue-btn`);
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Loading…'; }
    try {
      const res = await fetch(`${API}/api/sessions/${sessionId}/messages`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const messages = data.messages || [];
      if (!messages.length) { showToast('Session has no messages to load'); return; }
      chatHistory = [];
      attachedFile = null;
      lastTotalTokens = 0;
      removeAttachment();
      document.getElementById('ctx-bar-wrap').style.display = 'none';
      const container = document.getElementById('chat-messages');
      container.innerHTML = `
        <div style="text-align:center;color:var(--muted);font-size:12px;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:4px">
          📂 Continued from saved session · ${messages.length} messages loaded
        </div>`;
      for (const msg of messages) {
        chatHistory.push(msg);
        appendMessage(msg.role, msg.content);
      }
      closeSessionsDrawer();
    } catch (err) {
      showToast(`❌ Could not load session: ${err.message}`);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '▶ Continue'; }
    }
  }

  async function deleteSession(sessionId, btn) {
    if (!confirm('Delete this session? This cannot be undone.')) return;
    btn.disabled = true;
    btn.textContent = '⏳';
    try {
      const res = await fetch(`${API}/api/sessions/${sessionId}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      document.getElementById(`sess-${sessionId}`)?.remove();
      const remaining = document.querySelectorAll('#sessions-list .sess-card').length;
      if (!remaining) {
        document.getElementById('sessions-list').innerHTML =
          '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">No sessions found</div>';
      }
    } catch (err) {
      showToast(`❌ Delete failed: ${err.message}`);
      btn.disabled = false;
      btn.textContent = '🗑 Delete';
    }
  }

  // ── File upload ───────────────────────────────────────────────────────────

  async function handleFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    await uploadFile(file);
    input.value = '';
  }

  async function uploadFile(file) {
    const formData = new FormData();
    formData.append('file', file);
    showToast(`📎 Reading ${file.name}…`);
    try {
      const res = await fetch(`${API}/api/chat/upload`, { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
      attachedFile = { name: data.filename, text: data.text, chars: data.char_count };
      const preview = document.getElementById('chat-file-preview');
      document.getElementById('chat-file-name').textContent = data.filename;
      document.getElementById('chat-file-chars').textContent =
        `${data.char_count.toLocaleString()} chars${data.truncated ? ' (truncated)' : ''}`;
      preview.classList.add('active');
      if (data.truncated) showToast('⚠️ File truncated to 15,000 chars');
    } catch (err) {
      showToast(`❌ File error: ${err.message}`);
    }
  }

  function removeAttachment() {
    attachedFile = null;
    document.getElementById('chat-file-preview').classList.remove('active');
    document.getElementById('chat-file-name').textContent = '';
    document.getElementById('chat-file-chars').textContent = '';
  }

  // ── Drag-and-drop ─────────────────────────────────────────────────────────

  let dragCounter = 0;
  document.addEventListener('dragenter', () => { dragCounter++; document.getElementById('drop-overlay').classList.add('active'); });
  document.addEventListener('dragleave', () => { dragCounter--; if (dragCounter <= 0) { dragCounter = 0; document.getElementById('drop-overlay').classList.remove('active'); } });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', async e => {
    e.preventDefault(); dragCounter = 0;
    document.getElementById('drop-overlay').classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (file) await uploadFile(file);
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  if (typeof marked !== 'undefined') marked.setOptions({ breaks: true, gfm: true });
  loadSkills();

  // Restore session from localStorage if available
  (function restoreSession() {
    try {
      const savedSid  = localStorage.getItem(LS_KEY_SID);
      const savedHist = localStorage.getItem(LS_KEY_HISTORY);
      if (savedHist) {
        const parsed = JSON.parse(savedHist);
        if (Array.isArray(parsed) && parsed.length > 0) {
          chatHistory = parsed;
          currentSessionId = savedSid || generateUUID();
          const container = document.getElementById('chat-messages');
          container.innerHTML = '';
          for (const msg of chatHistory) {
            appendMessage(msg.role, msg.content);
          }
          return;
        }
      }
    } catch(e) {}
    currentSessionId = generateUUID();
  })();
</script>
